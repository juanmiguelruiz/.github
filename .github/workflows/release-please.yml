name: Release Please (Reusable)

on:
  workflow_call:
    inputs:
      repository:
        required: true
        type: string
    secrets:
      TOKEN:
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source repository
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.repository }}
          token: ${{ secrets.TOKEN }}

      - name: Checkout global templates
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository_owner }}/.github
          token: ${{ secrets.TOKEN }}
          path: .github-shared-templates

      - name: Inject and customize configurations
        run: |
          # 1. Extract only the repo name (e.g., "my-project")
          REPO_NAME=$(echo "${{ inputs.repository }}" | cut -d'/' -f2)

          # 2. If config-file doesn't exist, copy from the subfolder path and swap placeholder
          if [ ! -f "release-please-config.json" ]; then
            echo "Creating dynamic configuration file for $REPO_NAME..."
            cp .github-shared-templates/.github/templates/release-please-config.json ./release-please-config.json
            sed -i "s/{{PACKAGE_NAME}}/$REPO_NAME/g" release-please-config.json
          fi

          # 3. Copy base manifest from the subfolder path ONLY if the project doesn't have one already
          cp -n .github-shared-templates/.github/templates/.release-please-manifest.json ./ || true

      - name: Run release-please
        uses: googleapis/release-please-action@v4
        with:
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json
          token: ${{ secrets.TOKEN }}
